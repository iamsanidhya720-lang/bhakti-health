<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bhakti - AI Mental Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#1a0b2e;--dark:#0f0f23;--gold:#d4af37;--blue:#4f8ff7;
  --fg:#fff;--muted:#b8b8d1;--glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.1);--green:#10b981;
}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--fg);overflow-x:hidden;min-height:100vh;min-height:100dvh}
.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at center,var(--purple),var(--dark) 70%)}
.orbs{position:fixed;inset:0;z-index:-1;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(1px);opacity:.6;animation:float 15s infinite ease-in-out}
.orb:nth-child(1){width:300px;height:300px;background:linear-gradient(135deg,#ff6b6b,#4ecdc4,#45b7d1);top:10%;left:70%}
.orb:nth-child(2){width:200px;height:200px;background:linear-gradient(135deg,#667eea,#764ba2);top:60%;left:10%;animation-delay:5s}
.orb:nth-child(3){width:150px;height:150px;background:linear-gradient(135deg,#f093fb,#f5576c);top:80%;right:20%;animation-delay:10s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);opacity:.6}25%{transform:translate(30px,-30px) scale(1.05);opacity:.8}50%{transform:translate(-20px,20px) scale(.95);opacity:.4}75%{transform:translate(40px,10px) scale(1.1);opacity:.7}}

/* Landing */
#landing{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
header{display:flex;justify-content:space-between;align-items:center;margin:16px;padding:20px 28px;background:var(--glass);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(10px)}
.logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav a{color:var(--muted);text-decoration:none;font-size:15px;font-weight:500;padding:8px 14px;border-radius:8px;transition:.3s}
nav a:hover{color:var(--fg);background:var(--glass)}
.hero{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero-inner{max-width:800px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(56px,12vw,120px);line-height:.9;margin-bottom:28px;background:linear-gradient(135deg,#fff 0%,var(--gold) 50%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;transform:translateY(40px);animation:fadeUp 1.2s ease-out .3s forwards}
.subtitle{font-size:clamp(18px,3vw,26px);color:var(--muted);margin-bottom:56px;height:36px;display:flex;align-items:center;justify-content:center;opacity:0;animation:fadeUp 1s ease-out .8s forwards}
.typewriter{border-right:3px solid var(--gold);padding-right:4px;animation:blink 1.2s infinite}
@keyframes blink{from,to{border-right-color:transparent}50%{border-right-color:var(--gold)}}
.cta{background:linear-gradient(135deg,var(--gold),#f7d794);color:var(--dark);border:none;padding:22px 60px;border-radius:50px;font-size:18px;font-weight:700;font-family:'Playfair Display',serif;cursor:pointer;letter-spacing:.15em;text-transform:uppercase;box-shadow:0 12px 40px rgba(212,175,55,.4);transition:.4s cubic-bezier(.23,1,.32,1);opacity:0;transform:translateY(30px);animation:fadeUp 1.2s ease-out 1.4s forwards}
.cta:hover{transform:translateY(-6px) scale(1.05);box-shadow:0 20px 60px rgba(212,175,55,.5)}
@keyframes fadeUp{to{opacity:1;transform:translateY(0) scale(1)}}

/* Chat */
#chat{display:none;height:100vh;height:100dvh;flex-direction:column}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:var(--glass);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0}
.back-btn{background:var(--glass);border:1px solid var(--border);color:var(--muted);padding:10px 18px;border-radius:12px;cursor:pointer;font-family:'Inter',sans-serif;font-size:15px;transition:.3s;display:flex;align-items:center;gap:8px}
.back-btn:hover{color:var(--fg);background:rgba(255,255,255,.1)}
.ai-info{display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--glass);border:1px solid var(--border);border-radius:14px}
.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#4ecdc4,#45b7d1);display:flex;align-items:center;justify-content:center;font-size:22px;animation:avatarPulse 3s ease-in-out infinite}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 20px rgba(79,143,247,.3)}50%{box-shadow:0 0 30px rgba(79,143,247,.6)}}
.ai-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:600}
.ai-sub{color:var(--muted);font-size:13px;margin-top:2px}
.online{display:flex;align-items:center;gap:7px;color:var(--green);font-size:12px;font-weight:500}
.dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.4)}}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;overscroll-behavior:contain}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
.msg{max-width:80%;animation:msgIn .4s ease-out}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end}
@keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.bubble{padding:16px 22px;border-radius:20px;font-size:15px;line-height:1.6;backdrop-filter:blur(20px);border:1px solid transparent}
.msg.ai .bubble{background:linear-gradient(135deg,rgba(79,143,247,.15),rgba(79,143,247,.08));border-color:rgba(79,143,247,.3);border-radius:20px 20px 20px 6px}
.msg.user .bubble{background:linear-gradient(135deg,rgba(212,175,55,.2),rgba(212,175,55,.1));border-color:rgba(212,175,55,.4);border-radius:20px 20px 6px 20px}
.ts{font-size:11px;color:var(--muted);margin-top:4px;opacity:.7}

/* Typing indicator */
.typing{display:none;align-self:flex-start;max-width:80%}
.typing .bubble{background:linear-gradient(135deg,rgba(79,143,247,.1),rgba(79,143,247,.05));border-color:rgba(79,143,247,.2);border-radius:20px 20px 20px 6px;display:flex;align-items:center;gap:10px;padding:14px 20px}
.typing-text{color:var(--muted);font-style:italic;font-size:13px}
.dots{display:flex;gap:4px}
.dots span{width:6px;height:6px;background:var(--blue);border-radius:50%;animation:typePulse 1.4s infinite ease-in-out}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes typePulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

/* MCQ */
.mcq-wrap{padding:18px;background:linear-gradient(135deg,rgba(79,143,247,.1),rgba(79,143,247,.05));border:2px solid rgba(79,143,247,.3);border-radius:16px}
.mcq-q{margin-bottom:14px;font-weight:500;line-height:1.6}
.mcq-opts{display:flex;flex-direction:column;gap:9px;margin:14px 0}
.mcq-opt{display:flex;align-items:center;gap:10px;padding:11px 15px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:11px;cursor:pointer;transition:.3s;font-family:'Inter',sans-serif;font-size:14px;color:var(--fg);width:100%;text-align:left}
.mcq-opt:hover{background:rgba(79,143,247,.1);border-color:rgba(79,143,247,.3);transform:translateY(-1px)}
.mcq-opt.selected{background:rgba(212,175,55,.2);border-color:rgba(212,175,55,.5);color:var(--gold)}
.mcq-opt:disabled{opacity:.7;cursor:not-allowed}
.opt-letter{width:24px;height:24px;background:rgba(79,143,247,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0}
.mcq-opt.selected .opt-letter{background:var(--gold);color:var(--dark)}
.mcq-hint{margin-top:10px;font-size:12px;color:var(--muted);font-style:italic;text-align:center}

/* Input */
.input-area{padding:16px 20px 24px;background:var(--glass);border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end;backdrop-filter:blur(20px);flex-shrink:0}
.input-wrap{flex:1;position:relative}
textarea{width:100%;background:var(--glass);border:2px solid var(--border);border-radius:22px;padding:14px 70px 14px 20px;color:var(--fg);font-size:16px;resize:none;outline:none;transition:.3s;font-family:'Inter',sans-serif;max-height:110px;min-height:50px;line-height:1.5;backdrop-filter:blur(10px)}
textarea::placeholder{color:var(--muted)}
textarea:focus{border-color:var(--gold);box-shadow:0 0 28px rgba(212,175,55,.25);background:rgba(255,255,255,.11)}
.counter{position:absolute;right:56px;bottom:14px;font-size:11px;color:var(--muted);opacity:0;transition:.3s;font-weight:500;pointer-events:none}
.counter.show{opacity:1}
.counter.warn{color:#f59e0b}
.counter.err{color:#ef4444}
.send{width:46px;height:46px;background:linear-gradient(135deg,var(--gold),#f7d794);border:none;border-radius:50%;color:var(--dark);font-size:17px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 4px 16px rgba(212,175,55,.3);flex-shrink:0}
.send:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 8px 24px rgba(212,175,55,.4)}
.send:disabled{opacity:.45;cursor:not-allowed;transform:none;background:linear-gradient(135deg,#555,#777)}

@media(max-width:600px){
  header{margin:8px;padding:14px 16px}
  nav{display:none}
  .logo{font-size:22px}
  .chat-header{padding:12px 16px}
  .ai-info{padding:8px 12px}
  .avatar{width:38px;height:38px;font-size:18px}
  .messages{padding:16px 12px;gap:14px}
  .msg{max-width:88%}
  .bubble{padding:14px 18px;font-size:14px}
  .input-area{padding:12px 14px 20px}
  textarea{font-size:16px;padding:12px 60px 12px 16px;min-height:46px}
  .back-btn span{display:none}
  .screen-box{padding:28px 20px;margin:16px}
  .screen-opts{grid-template-columns:1fr 1fr}
}

/* Screening Popup */
#screening{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:16px}
.screen-box{background:linear-gradient(135deg,rgba(26,11,46,.97),rgba(15,15,35,.97));border:1px solid var(--border);border-radius:24px;padding:40px 36px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:popIn .4s cubic-bezier(.23,1,.32,1)}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
.screen-box::-webkit-scrollbar{width:4px}
.screen-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.screen-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.screen-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.screen-count{font-size:13px;color:var(--muted);font-weight:600}
.progress-bar{width:100%;height:5px;background:rgba(255,255,255,.1);border-radius:10px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:10px;transition:width .5s ease}
.screen-q{font-size:16px;line-height:1.6;margin-bottom:24px;color:var(--fg);font-weight:500}
.screen-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.screen-opt{padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;color:var(--fg);text-align:left;transition:.25s;line-height:1.4}
.screen-opt:hover{background:rgba(79,143,247,.12);border-color:rgba(79,143,247,.4);transform:translateY(-1px)}
.screen-opt.picked{background:rgba(212,175,55,.2);border-color:rgba(212,175,55,.6);color:var(--gold)}
.screen-note{margin-top:20px;font-size:12px;color:var(--muted);text-align:center;opacity:.8}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<!-- Landing -->
<div id="landing">
  <header>
    <div class="logo">Bhakti</div>
    <nav>
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">Support</a>
    </nav>
  </header>
  <div class="hero">
    <div class="hero-inner">
      <h1>Bhakti</h1>
      <p class="subtitle"><span id="tw" class="typewriter"></span></p>
      <button class="cta" onclick="startChat()">Start Your Journey</button>
    </div>
  </div>
</div>

<!-- Screening Popup -->
<div id="screening">
  <div class="screen-box">
    <div class="screen-top">
      <div class="screen-title">Quick Check-in 🧠</div>
      <div class="screen-count" id="screenCount">1 / 15</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:6.6%"></div></div>
    <div class="screen-q" id="screenQ"></div>
    <div class="screen-opts" id="screenOpts"></div>
    <div class="screen-note">Tumhare answers sirf Dr. Aisha ke saath share honge 🔒</div>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div class="chat-header">
    <button class="back-btn" onclick="goBack()">← <span>Home</span></button>
    <div class="ai-info">
      <div class="avatar">🧠</div>
      <div>
        <div class="ai-name">Dr. Aisha</div>
        <div class="ai-sub" id="aiSub">Your GenZ Mental Health Buddy</div>
      </div>
      <div class="online"><div class="dot"></div>Online</div>
    </div>
  </div>
  <div class="messages" id="msgs" role="log" aria-live="polite"></div>
  <div class="typing" id="typing">
    <div class="bubble">
      <span class="typing-text">Dr. Aisha is thinking</span>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Jo bhi mind mein hai, share kar do... 💭" rows="1" maxlength="1000" aria-label="Type your message"></textarea>
      <div class="counter" id="counter">0/1000</div>
    </div>
    <button class="send" id="sendBtn" onclick="send()" disabled>→</button>
  </div>
</div>

<script>
// Typewriter
const phrases=["AI-Powered Mental Wellness","Your Safe Space to Heal","24/7 Compassionate Support","No Judgment Zone","Real Talk, Real Help"];
let pi=0,ci=0,del=false;
const tw=document.getElementById('tw');
function type(){
  const p=phrases[pi],speed=del?40:100+Math.random()*30-15;
  tw.textContent=p.substring(0,del?--ci:++ci);
  if(!del&&ci===p.length)return setTimeout(()=>{del=true;type()},2600);
  if(del&&ci===0){del=false;pi=(pi+1)%phrases.length;return setTimeout(type,500)}
  setTimeout(type,speed);
}
setTimeout(type,2000);

// Screening Questions
const QUESTIONS=[
  {q:"Over the past two weeks, how often have you felt sad, empty, or hopeless?",opts:["Not at all","Occasionally (1–2 days)","More than half the days","Nearly every day"]},
  {q:"How often do you lose interest in activities you normally enjoy?",opts:["Never","Sometimes","Often","Almost always"]},
  {q:"How would you describe your sleep pattern recently?",opts:["Sleeping normally","Slight trouble sleeping","Difficulty sleeping most nights","Severe insomnia or excessive sleeping"]},
  {q:"How often do you feel nervous, anxious, or on edge?",opts:["Rarely","Sometimes","Frequently","Almost constantly"]},
  {q:"How well are you able to concentrate on work, studies, or daily tasks?",opts:["No difficulty concentrating","Slight difficulty sometimes","Frequent difficulty concentrating","Severe inability to focus"]},
  {q:"How often do you feel physically tired or drained without a clear reason?",opts:["Rarely","Occasionally","Most days","Almost every day"]},
  {q:"How often do you find yourself overthinking or worrying about the future?",opts:["Rarely","Sometimes","Often","Constantly"]},
  {q:"How satisfied are you with your relationships (friends, family, partner)?",opts:["Very satisfied","Somewhat satisfied","Mostly dissatisfied","Completely dissatisfied"]},
  {q:"How often do you feel overwhelmed by responsibilities or life situations?",opts:["Rarely","Sometimes","Often","Almost always"]},
  {q:"How would you describe your motivation to complete tasks?",opts:["Highly motivated","Slightly reduced motivation","Often procrastinate","Very little motivation to do anything"]},
  {q:"How often do you feel irritable, frustrated, or angry without a strong reason?",opts:["Rarely","Occasionally","Often","Almost always"]},
  {q:"How often do you feel disconnected or emotionally numb?",opts:["Never","Sometimes","Frequently","Almost constantly"]},
  {q:"How often do you avoid social interaction or isolate yourself?",opts:["Rarely","Occasionally","Often","Almost always"]},
  {q:"Have you had thoughts that life is meaningless or not worth living?",opts:["Never","Occasionally","Often","Very frequently"]},
  {q:"How much does your mental state affect your work, studies, or daily functioning?",opts:["Not at all","Slightly","Moderately","Severely"]}
];

let screenIdx=0, screenScores=[], screenAnswers=[];

function showScreening(){
  el('landing').style.display='none';
  el('screening').style.display='flex';
  screenIdx=0; screenScores=[]; screenAnswers=[];
  renderQuestion();
}

function renderQuestion(){
  const q=QUESTIONS[screenIdx];
  el('screenQ').textContent=q.q;
  el('screenCount').textContent=`${screenIdx+1} / 15`;
  el('progressFill').style.width=`${((screenIdx)/15)*100}%`;
  const opts=el('screenOpts');
  opts.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='screen-opt';
    btn.textContent=`${['A','B','C','D'][i]}) ${opt}`;
    btn.onclick=()=>pickAnswer(i,opt);
    opts.appendChild(btn);
  });
}

function pickAnswer(score, text){
  // Highlight selection briefly
  document.querySelectorAll('.screen-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===score) b.classList.add('picked');
  });
  screenScores.push(score);
  screenAnswers.push({q:QUESTIONS[screenIdx].q, a:text, score});

  setTimeout(()=>{
    screenIdx++;
    if(screenIdx<15){
      renderQuestion();
    } else {
      finishScreening();
    }
  }, 350);
}

function finishScreening(){
  el('progressFill').style.width='100%';
  const total=screenScores.reduce((a,b)=>a+b,0);
  let level, emoji;
  if(total<=10){level='Mentally stable range';emoji='🟢';}
  else if(total<=20){level='Mild psychological distress';emoji='🟡';}
  else if(total<=30){level='Moderate mental health concern';emoji='🟠';}
  else{level='High distress — professional support recommended';emoji='🔴';}

  // Build summary for AI
  const summary=`[SCREENING RESULTS]\nTotal Score: ${total}/45\nLevel: ${level}\n\nDetailed Answers:\n`+
    screenAnswers.map((a,i)=>`Q${i+1}: ${a.q}\nAnswer: ${a.a} (score: ${a.score})`).join('\n\n');

  // Open chat
  el('screening').style.display='none';
  el('chat').style.display='flex';

  // Opening message from Dr. Aisha using screening data
  const opening=`Hey yaar! 🌟 Main Dr. Aisha hun — tumhari safe space.\n\nTumhara quick check-in dekha maine ${emoji} Score ${total}/45 — ${level}.\n\nKoi judgment nahi hai bilkul. Yeh results sirf hamari conversation ko better banane ke liye hain. Ab batao freely — kya chal raha hai life mein? 💙`;
  addMsg(opening,false);

  // Send screening data silently to AI as context
  history.push({role:'user',content:summary});
  history.push({role:'assistant',content:opening});

  setTimeout(()=>el('input').focus(),300);
}

// State
let busy=false;
const history=[];
const el=id=>document.getElementById(id);
const fmt=t=>new Intl.DateTimeFormat('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}).format(t);

function addMsg(text,isUser){
  const msgs=el('msgs');
  const div=document.createElement('div');
  div.className=`msg ${isUser?'user':'ai'}`;
  const isMCQ=!isUser&&/\[MCQ\]/.test(text);
  div.innerHTML=`<div class="bubble">${isMCQ?renderMCQ(text):renderText(text)}</div><div class="ts">${fmt(new Date())}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function renderText(t){
  return t.replace(/\[MCQ\][\s\S]*/,'')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function renderMCQ(raw){
  const lines=raw.split('\n');
  const qEnd=lines.findIndex(l=>/^\s*[A-D]\)/.test(l));
  const question=lines.slice(0,qEnd).join('\n').replace('[MCQ]','').trim();
  const opts=lines.slice(qEnd).filter(l=>/^\s*[A-D]\)/.test(l));
  let html=`<div class="mcq-wrap"><div class="mcq-q">${question.replace(/\n/g,'<br>')}</div><div class="mcq-opts">`;
  opts.forEach(o=>{
    const letter=o.trim()[0],content=o.trim().substring(2).trim();
    html+=`<button class="mcq-opt" onclick="pickMCQ('${letter}','${content.replace(/'/g,"\\'")}')"><span class="opt-letter">${letter}</span><span>${content}</span></button>`;
  });
  return html+`</div><div class="mcq-hint">Ek option choose karo ya type karo 💫</div></div>`;
}

function pickMCQ(letter,text){
  document.querySelectorAll('.mcq-opt').forEach(b=>{
    b.disabled=true;
    if(b.querySelector('.opt-letter').textContent===letter)b.classList.add('selected');
  });
  el('input').value=`${letter}) ${text}`;
  setTimeout(send,400);
}

function setTyping(show,sub=''){
  el('typing').style.display=show?'flex':'none';
  el('aiSub').textContent=show?sub:'Your GenZ Mental Health Buddy';
  if(show)el('msgs').scrollTop=el('msgs').scrollHeight;
}

function updateCounter(){
  const inp=el('input'),cnt=el('counter'),btn=el('sendBtn');
  const n=inp.value.length;
  cnt.textContent=`${n}/1000`;
  cnt.classList.toggle('show',n>0);
  cnt.classList.toggle('warn',n>750&&n<=900);
  cnt.classList.toggle('err',n>900);
  btn.disabled=n===0||busy;
}

// Call our secure Vercel backend — API key never exposed to browser
async function callAI(userMsg){
  const res=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:[...history,{role:'user',content:userMsg}]})
  });
  if(!res.ok)throw new Error('API error');
  const data=await res.json();
  return data.reply;
}

async function send(){
  const inp=el('input');
  const msg=inp.value.trim();
  if(!msg||busy)return;
  busy=true;el('sendBtn').disabled=true;
  addMsg(msg,true);
  history.push({role:'user',content:msg});
  inp.value='';inp.style.height='auto';updateCounter();
  const subs=['Tumhari baat samaj rahi hun...','Soch rahi hun...','Best response prepare kar rahi hun...'];
  setTyping(true,subs[Math.floor(Math.random()*subs.length)]);
  try{
    const reply=await callAI(msg);
    history.push({role:'assistant',content:reply});
    setTyping(false);
    addMsg(reply,false);
  }catch(e){
    setTyping(false);
    addMsg("Arre yaar, thoda technical glitch ho gaya 😅 Ek baar phir try karo?",false);
  }
  busy=false;el('sendBtn').disabled=false;inp.focus();
}

function startChat(){
  showScreening();
}

function goBack(){
  if(history.length>1&&!confirm('Session end karna hai? Conversation save nahi hogi.'))return;
  el('chat').style.display='none';
  el('screening').style.display='none';
  el('landing').style.display='flex';
  el('msgs').innerHTML='';
  history.length=0;busy=false;
}

const inp=el('input');
inp.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,110)+'px';
  updateCounter();
});
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
});
updateCounter();

window.addEventListener('beforeunload',e=>{
  if(history.length>1){e.returnValue='Session end hogi.';return e.returnValue}
});
</script>
</body>
